name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '18'
  RUST_VERSION: '1.70.0'

jobs:
  # Frontend React Native CI
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Check formatting (Prettier)
      run: npx prettier --check "**/*.{js,jsx,ts,tsx,json,md}"

    - name: Run ESLint (Lint)
      run: npm run lint

    - name: Run tests
      run: npm run test:ci

    - name: Build (TypeScript compilation)
      run: npx tsc --noEmit

  # Backend Rust CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
        components: rustfmt, clippy

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          backend/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

    - name: Check formatting (rustfmt)
      run: cargo fmt --all -- --check

    - name: Run Clippy (lint)
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo test --all-features

    - name: Build
      run: cargo build --release

  # Smart Contract Soroban CI
  smartcontract-ci:
    name: Smart Contract CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smartcontract/blink-contracts

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          smartcontract/blink-contracts/target/
        key: ${{ runner.os }}-soroban-cargo-${{ hashFiles('smartcontract/blink-contracts/Cargo.lock') }}

    - name: Check formatting (rustfmt)
      run: cargo fmt --all -- --check

    - name: Run Clippy (lint)
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo test --all-features

    - name: Build contracts
      run: cargo build --target wasm32-unknown-unknown --release