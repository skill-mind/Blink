name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '18'
  RUST_VERSION: '1.70.0'

jobs:
  # Frontend React Native CI
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript check
      run: npx tsc --noEmit

    - name: Run tests
      run: npm test -- --coverage --watchAll=false

    - name: Build Android (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload test coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Backend Rust CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
        components: rustfmt, clippy

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          backend/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run Clippy lints
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/blink_test

    - name: Build release
      run: cargo build --release

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: backend-test-results
        path: backend/target/debug/deps/

  # Smart Contract Soroban CI
  smartcontract-ci:
    name: Smart Contract CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smartcontract/blink-contracts

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown

    - name: Install Soroban CLI
      run: |
        cargo install --locked soroban-cli --features opt
        soroban --version

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          smartcontract/blink-contracts/target/
        key: ${{ runner.os }}-soroban-cargo-${{ hashFiles('smartcontract/blink-contracts/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run Clippy lints
      run: cargo clippy --all-targets -- -D warnings

    - name: Run contract tests
      run: cargo test

    - name: Build contracts
      run: soroban contract build

    - name: Optimize contracts
      run: soroban contract optimize --wasm target/wasm32-unknown-unknown/release/*.wasm

    - name: Upload contract artifacts
      uses: actions/upload-artifact@v3
      with:
        name: contract-artifacts
        path: smartcontract/blink-contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm

  # Security audit job
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust for audit
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit - Backend
      run: cargo audit
      working-directory: ./backend

    - name: Run security audit - Smart Contracts  
      run: cargo audit
      working-directory: ./smartcontract/blink-contracts

    - name: Frontend security audit
      working-directory: ./frontend
      run: |
        npm audit --audit-level moderate

  # Dependency check job
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Check outdated frontend dependencies
      working-directory: ./frontend
      run: npm outdated || true

    - name: Setup Rust for dependency check
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal

    - name: Install cargo-outdated
      run: cargo install cargo-outdated

    - name: Check outdated backend dependencies
      working-directory: ./backend
      run: cargo outdated || true

    - name: Check outdated contract dependencies
      working-directory: ./smartcontract/blink-contracts
      run: cargo outdated || true

  # Integration tests (if components work together)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, smartcontract-ci]
    if: github.event_name == 'pull_request'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blink_integration_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        targets: wasm32-unknown-unknown

    - name: Install Soroban CLI
      run: cargo install --locked soroban-cli --features opt

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build backend
      working-directory: ./backend
      run: cargo build --release

    - name: Build smart contracts
      working-directory: ./smartcontract/blink-contracts
      run: soroban contract build

    - name: Run integration tests
      run: |
        echo "Integration tests would run here"
        echo "This could include end-to-end testing between components"

  # Build status summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, smartcontract-ci, security-audit]
    if: always()
    
    steps:
    - name: Check build results
      run: |
        echo "Frontend CI: ${{ needs.frontend-ci.result }}"
        echo "Backend CI: ${{ needs.backend-ci.result }}"
        echo "Smart Contract CI: ${{ needs.smartcontract-ci.result }}"
        echo "Security Audit: ${{ needs.security-audit.result }}"
        
        if [ "${{ needs.frontend-ci.result }}" != "success" ] || \
           [ "${{ needs.backend-ci.result }}" != "success" ] || \
           [ "${{ needs.smartcontract-ci.result }}" != "success" ] || \
           [ "${{ needs.security-audit.result }}" != "success" ]; then
          echo "❌ Build failed"
          exit 1
        else
          echo "✅ All builds successful"
        fi